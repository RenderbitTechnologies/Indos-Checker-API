name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please help us understand your use case and proposed solution.

  - type: dropdown
    id: feature_type
    attributes:
      label: Feature Type
      description: What type of feature are you requesting?
      options:
        - New method/functionality
        - Enhanced error handling
        - Performance improvement
        - API change
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: "I would like to see..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: "I also considered..."
    validations:
      required: false

  - type: dropdown
    id: breaking_change
    attributes:
      label: Breaking Change
      description: Would this change be breaking?
      options:
        - No, backward compatible
        - Yes, requires major version bump
        - Possibly (needs discussion)
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: Use Case
      description: Describe your specific use case for this feature.
      placeholder: "In my application, I need to..."
    validations:
      required: true

  - type: textarea
    id: api_example
    attributes:
      label: API Example
      description: If applicable, show how the new feature would be used.
      placeholder: |
        ```php
        $checker = new IndosChecker();
        $result = $checker->newMethod('05LL0262', '14/08/1963');
        ```
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I have provided a clear use case for this feature
          required: true
        - label: I understand this is an open-source project and contributions are welcome
          required: true
