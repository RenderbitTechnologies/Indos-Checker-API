name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the information below to help us investigate and fix the issue.

  - type: input
    id: php_version
    attributes:
      label: PHP Version
      description: What PHP version are you using?
      placeholder: "8.1, 8.2, 8.3, 8.4"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What operating system are you using?
      placeholder: "macOS, Linux, Windows"
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: Issue Type
      description: What type of issue are you experiencing?
      options:
        - Validation error (InvalidArgumentException)
        - Network/Connection error (IndosCheckerException)
        - Parsing error (unexpected response format)
        - Data not found (empty array returned)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Create IndosChecker instance
        2. Call getData() with parameters...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: Describe what should happen...
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: error_message
    attributes:
      label: Error Message / Stack Trace
      description: If applicable, include any error messages or stack traces.
      placeholder: |
        [2026-06-26 10:30:00] IndosCheckerException: Connection timed out
        Stack trace:
        #0 ...
    validations:
      required: false

  - type: input
    id: indos_number
    attributes:
      label: INDOS Number Tested
      description: If applicable, the INDOS number you tested with (you can redact sensitive parts).
      placeholder: "05LL0262"
    validations:
      required: false

  - type: input
    id: date_of_birth
    attributes:
      label: Date of Birth Format
      description: What date format did you use? (DD/MM/YYYY is required)
      placeholder: "14/08/1963"
    validations:
      required: false

  - type: dropdown
    id: custom_config
    attributes:
      label: Custom Configuration
      description: Are you using custom client or endpoint configuration?
      options:
        - No, using defaults
        - Custom Guzzle client
        - Custom endpoint
        - Both custom client and endpoint
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here (network conditions, proxy settings, etc.).
      placeholder: Any additional information...
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      description: Please confirm the following before submitting
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
        - label: I am using PHP 8.1 or higher
          required: true
        - label: I am using the latest version of the library
          required: true
        - label: I have included all relevant information above
          required: true
